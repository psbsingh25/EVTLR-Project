name: Test Skills

on:
  push:
  pull_request:
    branches: [main]
  repository_dispatch:
    types: [skill-sync]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest --cov=ag_skills --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
