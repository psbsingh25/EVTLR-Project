extends: default

ignore: |
  node_modules/
  **/node_modules/
  pnpm-lock.yaml
  .git/
  dist/
  build/
  .crewai/workspace/

rules:
  document-start: disable
  line-length:
    max: 200
    allow-non-breakable-inline-mappings: true
  truthy:
    check-keys: false
  braces:
    max-spaces-inside: 1
  comments:
    min-spaces-from-content: 1
