review_security:
  description: |
    Perform an OWASP-grade security review of the changed code.

    STEP 1: Read the diff and context
    - Call WorkspaceTool(operation="read", filename="diff.txt", content="")
    - Call WorkspaceTool(operation="read", filename="context_pack.md", content="")
      (if it exists)
    - Call WorkspaceTool(operation="read", filename="diff_context.json", content="")
      (if it exists — may have been written by quick review)
    - Call WorkspaceTool(operation="read", filename="changed_files_index.json", content="")
      (if it exists)
    - Call WorkspaceTool(operation="read", filename="scope.json", content="")
      (if it exists)

    STEP 1b: Perform selective repo exploration (do NOT load entire repo)
    - Use CommitInfoTool(commit_sha=<head sha>, repository=<repo>) to anchor recent branch intent
    - Use RelatedFilesTool(changed_files=[...], repository=<workspace path>) to discover impacted files
    - Use FileContentTool(file_path=<target>, repository=<repo>, ref="HEAD") for targeted deep reads
    - If baseline comparison is required, use FileContentTool(..., ref=<merge_base>) for only critical files

    STEP 2: Analyze for security vulnerabilities
    Focus on CHANGED code only. Check for:
    - Injection flaws (SQL, NoSQL, OS command, LDAP, XPath)
    - Broken authentication / session management
    - Sensitive data exposure (hardcoded secrets, PII in logs, missing encryption)
    - Broken access control (missing authz checks, IDOR, privilege escalation)
    - Security misconfiguration (debug mode, default credentials, open CORS)
    - XSS (reflected, stored, DOM-based)
    - Insecure deserialization
    - Known vulnerable dependencies (if lockfiles changed)
    - Insufficient logging and monitoring
    - SSRF, path traversal, open redirects

    For each finding, assess:
    - Exploitability: How easy is it to exploit?
    - Impact: What damage could result?
    - Confidence: How certain are you this is a real issue?

    STEP 3: Write structured output
    Call WorkspaceTool(operation="write", filename="security_review.json", content=<JSON>)

    Output schema:
    {
      "summary": "1-3 sentences: what matters most and why.",
      "severity_counts": {"critical": 0, "high": 0, "medium": 0, "low": 0, "info": 0},
      "findings": [
        {
          "id": "SEC-001",
          "title": "Short title",
          "severity": "critical|high|medium|low|info",
          "file": "path/to/file",
          "description": "What changed and why it matters from a security perspective",
          "recommendation": "Concrete fix — code snippet or specific action",
          "verification": "How to prove the fix works (test, manual check, tool)"
        }
      ]
    }

    RULES:
    - Prioritize CHANGED code and recent commits; include non-changed files only when they materially alter risk
    - ID prefix must be SEC-
    - severity_counts must match the actual findings list
    - If no issues found, return empty findings with info-level summary
    - Output must be valid JSON
    - Final response must be JSON only (no markdown, no prose, no code fences)

  expected_output: |
    "Security review complete: security_review.json written with [N] findings"
