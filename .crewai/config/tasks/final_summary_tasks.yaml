synthesize_summary:
  description: |
    Synthesize all crew outputs into a comprehensive final summary markdown document.

    READ ALL AVAILABLE OUTPUTS (check existence first, skip missing):
    1. WorkspaceTool(operation="read", filename="ci_summary.json", content="")
    2. WorkspaceTool(operation="read", filename="quick_review.json", content="")
    3. WorkspaceTool(operation="read", filename="router_decision.json", content="")
    4. WorkspaceTool(operation="read", filename="full_review.json", content="")
    5. WorkspaceTool(operation="read", filename="post_specialist_synthesis.json", content="")
    6. WorkspaceTool(operation="read", filename="executive_synthesis.json", content="")
    7. WorkspaceTool(operation="read", filename="diff_context.json", content="")

    SPECIALIST CREW OUTPUTS (read each if it exists):
    8.  WorkspaceTool(operation="read", filename="security_review.json", content="")
    9.  WorkspaceTool(operation="read", filename="legal_review.json", content="")
    10. WorkspaceTool(operation="read", filename="finance_review.json", content="")
    11. WorkspaceTool(operation="read", filename="documentation_review.json", content="")
    12. WorkspaceTool(operation="read", filename="agentic_consistency_review.json", content="")
    13. WorkspaceTool(operation="read", filename="marketing_review.json", content="")
    14. WorkspaceTool(operation="read", filename="science_review.json", content="")
    15. WorkspaceTool(operation="read", filename="government_regulatory_review.json", content="")
    16. WorkspaceTool(operation="read", filename="strategic_review.json", content="")
    17. WorkspaceTool(operation="read", filename="data_engineering_review.json", content="")
    18. WorkspaceTool(operation="read", filename="validation_report.json", content="")

    MARKDOWN STYLE RULES (from AGENTS.md / agentic/markdown_style_guide.md):
    You MUST follow these formatting rules in the output markdown:
    - Exactly ONE H1 title at the top of the document
    - H2 headings get exactly ONE emoji at the start: "## 🛡️ Security review"
    - H3 and H4 headings get NO emoji
    - Sentence case for headings: "## 🛡️ Security review" not "## 🛡️ Security Review"
    - Use <details> for collapsible sections
    - Tables: always include a header row, bold the key column, concise cells
    - Use `code formatting` for file paths, commands, config values
    - Bold sparingly — key terms only, never entire sentences
    - Horizontal rule --- after the title metadata block
    - No decorative emoji — only meaningful ones from approved set
    - Blank line before and after headings, code blocks, blockquotes, tables

    SYNTHESIZE INTO MARKDOWN:

    HEADER (H1 + metadata):
    # CrewAI Review Summary

    _PR #{pr_number} · {sha} · {repository} · {time}_

    ---

    EXECUTIVE SUMMARY (top-level, 2-4 sentences):
    ## 🧭 Executive summary
    Provide 2-4 actionable sentences that tell the reader:
    - what happened in this run,
    - what to read first next,
    - what to do next.
    Keep it concise and decision-oriented.

    PRIORITY ACTION ITEMS (always visible, top of document):
    ## 🎯 Priority action items
    Extract the top 5 most severe findings across ALL crews.
    Show as numbered list: severity emoji + title + file + one-line description.

    SEVERITY ROLLUP TABLE (if specialist crews ran):
    ## 📊 Severity rollup

    A table with columns: Crew, Critical, High, Medium, Low, Info.
    One row per specialist crew that produced output, plus a Total row.

    SECTIONS (include only for crews that ran):

    ## ✅ CI analysis
    Status, summary, critical errors if any.

    ## ⚡ Quick review
    Critical issues (open details), warnings and suggestions (collapsed details).

    ## 🔍 Full technical review
    Top 3-5 high-severity issues if the crew ran.

    For each specialist crew that ran, add a section with its corresponding emoji:
    - 🛡️ Security | ⚖️ Legal | 💰 Finance | 📚 Documentation
    - 🤖 Agentic | 📢 Marketing | 🔬 Science | 🏛️ Government | 📊 Strategy | 🗄️ Data engineering

    For each specialist section include:
    ### Summary
    The crew's summary line from the JSON.

    ### Critical and high findings
    Use <details open> with a bold red-circle header showing the count.
    For each finding show the title in bold, file path in backticks,
    then the description, then a fix line with 💡 prefix and the recommendation.
    Close with </details>.

    ### Other findings
    Use <details> (collapsed) with a bold header showing medium/low/info counts.
    Same format as above but collapsed by default.
    Close with </details>.

    ## 💡 Router suggestions
    Include autodetect suggestions if present.

    FOOTER:
    ---

    ## 🔗 Traceability
    List all JSON files that were read as a bullet list.

    _Generated by CrewAI Router System · {time}_

    WRITE FINAL OUTPUT:
    WorkspaceTool(operation="write", filename="final_summary.md", content="...the full markdown...")

    SUCCESS CRITERIA:
    - Follows ALL markdown style rules listed above
    - Exactly one H1, emoji on H2 only, no emoji on H3/H4
    - No required horizontal rule after </details> blocks
    - All available JSON files read
    - Final markdown >1000 characters
    - Covers all executed crews
    - Critical issues always visible (details open)
    - Severity rollup table if specialist crews ran
    - Priority action items section at the top
    - Actionable recommendations for developer

  expected_output: |
    "Synthesis complete: final_summary.md written with findings from {count} crews"
