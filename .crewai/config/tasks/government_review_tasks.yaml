review_government_compliance:
  description: |
    Review UI and workflows for accessibility, government compliance, and audit requirements.

    STEP 1: Read the diff and context
    - Call WorkspaceTool(operation="read", filename="diff.txt", content="")
    - Call WorkspaceTool(operation="read", filename="context_pack.md", content="")
      (if it exists)
    - Call WorkspaceTool(operation="read", filename="diff_context.json", content="")
      (if it exists)
    - Call WorkspaceTool(operation="read", filename="changed_files_index.json", content="")
      (if it exists)

    STEP 1b: Selective UI/compliance traversal
    - Use RelatedFilesTool(changed_files=[...], repository=<workspace path>) to identify impacted components/routes
    - Use FileContentTool(file_path=<target>, repository=<repo>, ref="HEAD") for focused WCAG/508 inspection
    - Use CommitInfoTool(commit_sha=<head sha>, repository=<repo>) when intent affects compliance posture

    STEP 2: Analyze government and accessibility compliance
    Focus on CHANGED code. Check for:

    Accessibility (WCAG 2.1 AA / Section 508):
    - Missing or incorrect ARIA labels and roles
    - Insufficient color contrast (< 4.5:1 for text, < 3:1 for large text)
    - Missing keyboard navigation support (focus management, tab order)
    - Images without alt text
    - Form inputs without associated labels
    - Missing skip navigation links
    - Dynamic content changes without ARIA live regions
    - Non-semantic HTML (div soup instead of proper landmarks)
    - Missing lang attribute on html element
    - Timeouts without user control or warning

    Audit trail requirements:
    - Missing timestamps on state changes
    - Actions without user attribution
    - Missing before/after values on updates
    - Insufficient logging for compliance-sensitive operations
    - Data retention policy violations

    Government procurement readiness:
    - Missing VPAT (Voluntary Product Accessibility Template) considerations
    - Non-compliant authentication flows (CAC/PIV support gaps)
    - Missing privacy impact indicators

    STEP 3: Write structured output
    Call WorkspaceTool(operation="write", filename="government_regulatory_review.json", content=<JSON>)

    Output schema:
    {
      "summary": "1-3 sentences: what matters most and why.",
      "severity_counts": {"critical": 0, "high": 0, "medium": 0, "low": 0, "info": 0},
      "findings": [
        {
          "id": "GOV-001",
          "title": "Short title",
          "severity": "critical|high|medium|low|info",
          "file": "path/to/file",
          "description": "What compliance issue was found and which standard it violates",
          "recommendation": "Specific fix with standards reference (e.g. WCAG 1.4.3)",
          "verification": "Testable check (e.g. axe-core rule, keyboard test, contrast check)"
        }
      ]
    }

    RULES:
    - Prioritize CHANGED code and directly connected UI/workflow files; include unchanged files only when they alter compliance outcome
    - ID prefix must be GOV-
    - severity_counts must match the actual findings list
    - Each finding should reference a specific standard where possible
    - If no UI or compliance code changed, return empty findings with info summary
    - Output must be valid JSON
    - Final response must be JSON only (no markdown, no prose, no code fences)

  expected_output: |
    "Government review complete: government_regulatory_review.json written with [N] findings"
