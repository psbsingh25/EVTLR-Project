<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Access denied." />
    <meta name="robots" content="noindex, nofollow" />
    <title>Access Denied</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-card auth-card-denied">
        <div class="auth-icon auth-icon-denied">
          <svg
            width="56"
            height="56"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10" />
            <line x1="4.93" y1="4.93" x2="19.07" y2="19.07" />
          </svg>
        </div>
        <h1 class="auth-title">Access Denied</h1>
        <p class="auth-subtitle">
          Your account is not authorized to access this area. If you believe
          this is an error, contact your administrator.
        </p>
        <a href="/" class="btn btn-secondary btn-sm">Return to Home</a>
      </div>
    </div>
  </body>
</html>
